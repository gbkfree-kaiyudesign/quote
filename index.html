<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>室內設計報價系統</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-faint: #9a9a96;
    --accent: #2d5a3d;
    --accent-light: #eaf3de;
    --accent-mid: #639922;
    --amber: #ba7517;
    --amber-light: #faeeda;
    --blue: #185fa5;
    --blue-light: #e6f1fb;
    --red: #a32d2d;
    --red-light: #fcebeb;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  .topbar { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; color: var(--accent); }
  .topbar-actions { display: flex; gap: 8px; }

  .container { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; color: var(--text); }
  .card-icon { width: 22px; height: 22px; border-radius: 6px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  @media (max-width: 560px) { .grid2, .grid3 { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  input[type=text], input[type=number], select, textarea {
    width: 100%; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    padding: 7px 10px; font-size: 13px; color: var(--text); background: var(--surface);
    outline: none; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(45,90,61,0.12); }
  textarea { resize: vertical; min-height: 60px; }

  .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  @media (max-width: 480px) { .metric-row { grid-template-columns: 1fr 1fr; } }
  .metric { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .metric-val { font-size: 18px; font-weight: 600; color: var(--text); }
  .metric-val.green { color: var(--accent); }

  .profit-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .profit-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .profit-row input[type=range] { flex: 1; min-width: 120px; accent-color: var(--accent); }
  .profit-row span { font-size: 13px; font-weight: 600; color: var(--accent); min-width: 36px; text-align: right; }

  .section-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .section-head { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); background: var(--bg); cursor: pointer; user-select: none; }
  .section-head-left { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
  .section-total { font-size: 13px; font-weight: 600; color: var(--accent); }
  .section-body { padding: 12px 16px; }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
  thead th { font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: left; padding: 5px 6px; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  tbody td { padding: 5px 6px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody td input, tbody td select { border: 0.5px solid var(--border); padding: 4px 7px; font-size: 13px; }
  .sub-cell { font-weight: 600; color: var(--text); white-space: nowrap; }

  .add-btn { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 7px 14px; border-radius: var(--radius-sm); border: 0.5px dashed var(--border-strong); background: none; color: var(--text-muted); cursor: pointer; width: 100%; justify-content: center; margin-top: 10px; }
  .add-btn:hover { background: var(--bg); color: var(--text); }

  .rm-btn { background: none; border: none; cursor: pointer; color: var(--text-faint); font-size: 16px; padding: 2px 5px; border-radius: 4px; line-height: 1; }
  .rm-btn:hover { color: var(--red); background: var(--red-light); }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 8px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong); cursor: pointer; font-weight: 500; font-family: inherit; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #254d35; }
  .btn-ghost { background: var(--surface); color: var(--text); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-amber { background: var(--amber-light); color: var(--amber); border-color: var(--amber); }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .badge-green { background: var(--accent-light); color: var(--accent); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-blue { background: var(--blue-light); color: var(--blue); }

  .pie-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .pie-legend { flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 6px; }
  .leg-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .leg-name { flex: 1; color: var(--text-muted); }
  .leg-pct { font-weight: 600; }
  .leg-amt { color: var(--text-faint); font-size: 11px; }

  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .history-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .history-btn { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; }
  .history-btn:hover { background: var(--bg); }
  .history-btn.del:hover { background: var(--red-light); color: var(--red); border-color: var(--red); }

  .empty-state { text-align: center; padding: 24px; color: var(--text-faint); font-size: 13px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .print-area { display: none; }

  .action-bar { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; margin-top: 4px; }

  @media print {
    .topbar, .action-bar, .add-btn, .rm-btn, .profit-row { display: none !important; }
    .print-area { display: block !important; }
    body { background: #fff; }
    .card, .section-card { border: 1px solid #ddd; page-break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🏠 室內設計報價系統</div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="showHistory()">📋 歷史報價</button>
    <button class="btn btn-amber" onclick="saveQuote()">💾 存檔</button>
    <button class="btn btn-primary" onclick="window.print()">🖨️ 列印 / PDF</button>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title"><div class="card-icon">👤</div> 客戶與專案資訊</div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><label>客戶姓名</label><input type="text" id="client-name" placeholder="例：林先生"></div>
      <div class="field"><label>專案地址</label><input type="text" id="project-addr" placeholder="例：台北市大安區"></div>
    </div>
    <div class="grid3" style="margin-bottom:10px">
      <div class="field">
        <label>空間類型</label>
        <select id="space-type" onchange="updateSpaceType()">
          <option value="apartment">一般住宅公寓</option>
          <option value="house">透天厝</option>
          <option value="office">辦公室</option>
          <option value="shop">商業空間</option>
          <option value="new">新成屋</option>
          <option value="old">老屋翻新</option>
        </select>
      </div>
      <div class="field"><label>坪數</label><input type="number" id="area" value="30" min="1" max="500" step="1" onchange="recalc()"></div>
      <div class="field">
        <label>設計風格</label>
        <select id="style-type">
          <option>現代簡約</option><option>北歐風</option><option>日式無印</option>
          <option>工業風</option><option>古典歐式</option><option>輕奢風</option>
        </select>
      </div>
    </div>
    <div class="field"><label>備註（給客戶看）</label><textarea id="note" placeholder="例：本報價有效期 30 天，不含家電採購..."></textarea></div>
  </div>

  <div class="metric-row">
    <div class="metric"><div class="metric-label">工料總成本</div><div class="metric-val" id="cost-total">NT$ 0</div></div>
    <div class="metric"><div class="metric-label">建議報價（含利潤）</div><div class="metric-val green" id="quote-total">NT$ 0</div></div>
    <div class="metric"><div class="metric-label">每坪單價</div><div class="metric-val" id="per-ping">NT$ 0</div></div>
  </div>
  <div class="profit-row">
    <label>利潤率</label>
    <input type="range" min="5" max="60" step="1" value="25" id="profit-rate" oninput="document.getElementById('profit-label').textContent=this.value+'%';recalc()">
    <span id="profit-label">25%</span>
  </div>

  <div id="sections-container"></div>

  <div class="card">
    <div class="card-title"><div class="card-icon">🥧</div> 費用結構分析</div>
    <div class="pie-row">
      <canvas id="pie-chart" width="150" height="150" style="flex-shrink:0"></canvas>
      <div class="pie-legend" id="pie-legend"></div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-ghost" onclick="clearAll()">🗑 清除全部</button>
    <button class="btn btn-ghost" onclick="copyText()">📋 複製文字報價</button>
    <button class="btn btn-amber" onclick="saveQuote()">💾 存入歷史</button>
    <button class="btn btn-primary" onclick="window.print()">🖨️ 列印 / 輸出 PDF</button>
  </div>

</div>

<div class="modal-bg" id="history-modal">
  <div class="modal">
    <div class="modal-title">📋 歷史報價記錄</div>
    <div id="history-content"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      <button class="btn btn-ghost" style="color:var(--red)" onclick="clearHistory()">清除全部記錄</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="copy-modal">
  <div class="modal">
    <div class="modal-title">📋 複製以下文字到 LINE</div>
    <textarea id="copy-text" style="width:100%;height:260px;font-size:12px;font-family:monospace" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      <button class="btn btn-primary" onclick="doCopy()">複製文字</button>
    </div>
  </div>
</div>

<script>
const SECTIONS_DEF = [
  { id:'design', label:'設計費', icon:'📐',
    items:['設計規劃費','平面圖繪製','3D情境圖','施工圖','監工費','現場丈量'],
    specs:['一式','依坪計','依張計'], units:['式','項'], isDesign:true },
  { id:'demo', label:'拆除 & 泥作', icon:'🔨',
    items:['拆除舊裝潢','拆除牆面','泥作地坪','泥作牆面','防水工程','磁磚鋪設','廁所磁磚'],
    specs:['一般','加強','進口'], units:['式','m²','坪'], isDesign:false },
  { id:'mep', label:'水電工程', icon:'⚡',
    items:['電路配線','插座增設','開關工程','給排水配管','浴室給水','熱水器配管','空調配管'],
    specs:['一般','加強','加大'], units:['式','m','個','組'], isDesign:false },
  { id:'wood', label:'木作 & 裝修', icon:'🪵',
    items:['天花板木作','電視牆木作','主臥衣櫃','玄關鞋櫃','廚具系統','門片工程','床頭背板','系統書櫃'],
    specs:['一般','系統','訂製'], units:['式','m²','組','件'], isDesign:false },
  { id:'ff', label:'家具 & 軟裝', icon:'🛋️',
    items:['沙發','餐桌椅','主臥床架','床頭燈','窗簾','地毯','裝飾掛畫','主燈具'],
    specs:['國產','進口','訂製'], units:['式','組','件','套'], isDesign:false },
];

const PIE_COLORS = ['#2d5a3d','#378ADD','#ba7517','#D4537E','#7F77DD'];

function fmt(n){ return 'NT$ '+Math.round(n).toLocaleString('zh-TW'); }

function buildSections(){
  const cont = document.getElementById('sections-container');
  cont.innerHTML = '';
  SECTIONS_DEF.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section-card';
    div.id = 'sec-'+sec.id;
    div.innerHTML = `
      <div class="section-head" onclick="toggleSection('${sec.id}')">
        <div class="section-head-left">${sec.icon} ${sec.label}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="section-total" id="total-${sec.id}">NT$ 0</span>
          <span style="color:var(--text-faint);font-size:18px" id="caret-${sec.id}">▾</span>
        </div>
      </div>
      <div class="section-body" id="body-${sec.id}">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="min-width:130px">項目</th>
              <th style="min-width:80px">規格</th>
              <th style="min-width:90px">單價(元)</th>
              <th style="min-width:60px">數量</th>
              <th style="min-width:60px">單位</th>
              <th style="min-width:90px">小計</th>
              <th></th>
            </tr></thead>
            <tbody id="tbody-${sec.id}"></tbody>
          </table>
        </div>
        <button class="add-btn" onclick="addRow('${sec.id}')">＋ 新增項目</button>
      </div>`;
    cont.appendChild(div);
  });
}

function toggleSection(id){
  const body = document.getElementById('body-'+id);
  const caret = document.getElementById('caret-'+id);
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  caret.textContent = hidden ? '▾' : '▸';
}

function addRow(secId, data){
  const sec = SECTIONS_DEF.find(s=>s.id===secId);
  const tbody = document.getElementById('tbody-'+secId);
  const tr = document.createElement('tr');
  const d = data || {};
  const itemSel = `<select onchange="recalc()">`+sec.items.map((it,i)=>`<option${(d.item===it||(!d.item&&i===0))?' selected':''}>${it}</option>`).join('')+`</select>`;
  const specSel = `<select onchange="recalc()">`+sec.specs.map((sp,i)=>`<option${(d.spec===sp||(!d.spec&&i===0))?' selected':''}>${sp}</option>`).join('')+`</select>`;
  const unitSel = `<select onchange="recalc()">`+sec.units.map((u,i)=>`<option${(d.unit===u||(!d.unit&&i===0))?' selected':''}>${u}</option>`).join('')+`</select>`;
  tr.innerHTML = `
    <td>${itemSel}</td>
    <td>${specSel}</td>
    <td><input type="number" value="${d.price||3000}" min="0" step="100" onchange="recalc()" style="width:88px"></td>
    <td><input type="number" value="${d.qty||1}" min="0.1" step="0.5" onchange="recalc()" style="width:56px"></td>
    <td>${unitSel}</td>
    <td class="sub-cell">NT$ 3,000</td>
    <td><button class="rm-btn" onclick="this.closest('tr').remove();recalc()" aria-label="刪除">×</button></td>`;
  tbody.appendChild(tr);
  recalc();
}

function getSectionTotal(secId){
  let t = 0;
  document.querySelectorAll(`#tbody-${secId} tr`).forEach(tr=>{
    const inputs = tr.querySelectorAll('input[type=number]');
    if(inputs.length >= 2){
      const sub = (parseFloat(inputs[0].value)||0) * (parseFloat(inputs[1].value)||1);
      const sc = tr.querySelector('.sub-cell');
      if(sc) sc.textContent = fmt(sub);
      t += sub;
    }
  });
  document.getElementById('total-'+secId).textContent = fmt(t);
  return t;
}

function recalc(){
  const totals = SECTIONS_DEF.map(s=>getSectionTotal(s.id));
  const cost = totals.reduce((a,b)=>a+b,0);
  const rate = (parseInt(document.getElementById('profit-rate').value)||25)/100;
  const quote = cost*(1+rate);
  const area = parseInt(document.getElementById('area').value)||1;
  document.getElementById('cost-total').textContent = fmt(cost);
  document.getElementById('quote-total').textContent = fmt(quote);
  document.getElementById('per-ping').textContent = fmt(quote/area);
  drawPie(totals);
}

function drawPie(vals){
  const canvas = document.getElementById('pie-chart');
  const ctx = canvas.getContext('2d');
  const cx=75,cy=75,r=68,ri=30;
  ctx.clearRect(0,0,150,150);
  const total = vals.reduce((a,b)=>a+b,0)||1;
  let angle = -Math.PI/2;
  vals.forEach((v,i)=>{
    const sweep = v/total*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+sweep);
    ctx.closePath(); ctx.fillStyle=PIE_COLORS[i]; ctx.fill();
    angle += sweep;
  });
  ctx.beginPath(); ctx.arc(cx,cy,ri,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();

  const legend = document.getElementById('pie-legend');
  legend.innerHTML = vals.map((v,i)=>{
    const pct = Math.round(v/total*100);
    return `<div class="leg-item">
      <div class="leg-dot" style="background:${PIE_COLORS[i]}"></div>
      <span class="leg-name">${SECTIONS_DEF[i].label}</span>
      <span class="leg-pct">${pct}%</span>
      <span class="leg-amt">${fmt(v)}</span>
    </div>`;
  }).join('');
}

function updateSpaceType(){
  const t = document.getElementById('space-type').value;
  const areaEl = document.getElementById('area');
  const map = {apartment:30,house:55,office:60,shop:40,new:35,old:28};
  areaEl.value = map[t]||30; recalc();
}

function clearAll(){
  if(!confirm('確定要清除所有項目嗎？')) return;
  SECTIONS_DEF.forEach(s=>{ document.getElementById('tbody-'+s.id).innerHTML=''; });
  document.getElementById('client-name').value='';
  document.getElementById('project-addr').value='';
  document.getElementById('note').value='';
  document.getElementById('area').value=30;
  document.getElementById('profit-rate').value=25;
  document.getElementById('profit-label').textContent='25%';
  recalc();
}

function getQuoteData(){
  const rows={};
  SECTIONS_DEF.forEach(sec=>{
    rows[sec.id]=[];
    document.querySelectorAll(`#tbody-${sec.id} tr`).forEach(tr=>{
      const sels=tr.querySelectorAll('select');
      const ins=tr.querySelectorAll('input[type=number]');
      if(ins.length>=2) rows[sec.id].push({
        item:sels[0]?.value, spec:sels[1]?.value,
        price:parseFloat(ins[0].value)||0, qty:parseFloat(ins[1].value)||1,
        unit:sels[2]?.value
      });
    });
  });
  return {
    client:document.getElementById('client-name').value,
    addr:document.getElementById('project-addr').value,
    area:document.getElementById('area').value,
    style:document.getElementById('style-type').value,
    spaceType:document.getElementById('space-type').value,
    profitRate:document.getElementById('profit-rate').value,
    note:document.getElementById('note').value,
    rows, date: new Date().toLocaleDateString('zh-TW')
  };
}

function saveQuote(){
  const data = getQuoteData();
  if(!data.client){ alert('請先填入客戶姓名再存檔'); return; }
  const list = JSON.parse(localStorage.getItem('quotes')||'[]');
  list.unshift({ id:Date.now(), ...data });
  localStorage.setItem('quotes', JSON.stringify(list.slice(0,30)));
  alert(`✅ 已存檔：${data.client}（${data.date}）`);
}

function loadQuote(data){
  document.getElementById('client-name').value = data.client||'';
  document.getElementById('project-addr').value = data.addr||'';
  document.getElementById('area').value = data.area||30;
  document.getElementById('profit-rate').value = data.profitRate||25;
  document.getElementById('profit-label').textContent = (data.profitRate||25)+'%';
  document.getElementById('note').value = data.note||'';
  SECTIONS_DEF.forEach(sec=>{
    document.getElementById('tbody-'+sec.id).innerHTML='';
    (data.rows[sec.id]||[]).forEach(row=>addRow(sec.id, row));
  });
  closeModal(); recalc();
}

function showHistory(){
  const list = JSON.parse(localStorage.getItem('quotes')||'[]');
  const cont = document.getElementById('history-content');
  if(!list.length){ cont.innerHTML='<div class="empty-state">尚無歷史記錄</div>'; }
  else {
    cont.innerHTML = '<div class="history-list">'+list.map(q=>{
      const cost = SECTIONS_DEF.reduce((a,sec)=>{
        return a+(q.rows[sec.id]||[]).reduce((b,r)=>b+r.price*r.qty,0);
      },0);
      const quote = cost*(1+(parseInt(q.profitRate)||25)/100);
      return `<div class="history-item">
        <div>
          <div style="font-size:13px;font-weight:600">${q.client} — ${q.addr||'未填地址'}</div>
          <div class="history-meta">${q.date} · ${q.area}坪 · ${q.style||''} · 報價 ${fmt(quote)}</div>
        </div>
        <div class="history-actions">
          <button class="history-btn" onclick="loadQuote(${JSON.stringify(q).replace(/"/g,'&quot;')})">載入</button>
          <button class="history-btn del" onclick="deleteQuote(${q.id})">刪除</button>
        </div>
      </div>`;
    }).join('')+'</div>';
  }
  document.getElementById('history-modal').classList.add('open');
}

function deleteQuote(id){
  if(!confirm('確定刪除這筆記錄？')) return;
  const list = JSON.parse(localStorage.getItem('quotes')||'[]').filter(q=>q.id!==id);
  localStorage.setItem('quotes', JSON.stringify(list));
  showHistory();
}

function clearHistory(){
  if(!confirm('確定清除所有歷史記錄？')) return;
  localStorage.removeItem('quotes'); showHistory();
}

function closeModal(){
  document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
}

function copyText(){
  const data = getQuoteData();
  const totals = SECTIONS_DEF.map(sec=>
    (data.rows[sec.id]||[]).reduce((a,r)=>a+r.price*r.qty,0)
  );
  const cost = totals.reduce((a,b)=>a+b,0);
  const rate = (parseInt(data.profitRate)||25)/100;
  const quote = cost*(1+rate);
  const area = parseInt(data.area)||1;

  let txt = `【室內設計報價單】\n`;
  txt += `━━━━━━━━━━━━━━\n`;
  txt += `客戶：${data.client||'—'}\n`;
  txt += `地址：${data.addr||'—'}\n`;
  txt += `坪數：${data.area} 坪 ｜ 風格：${data.style||'—'}\n`;
  txt += `日期：${new Date().toLocaleDateString('zh-TW')}\n\n`;

  SECTIONS_DEF.forEach((sec,i)=>{
    const rows = data.rows[sec.id]||[];
    if(!rows.length) return;
    txt += `▌${sec.label}\n`;
    rows.forEach(r=>{ txt += `  ${r.item}（${r.spec}）× ${r.qty}${r.unit} = ${fmt(r.price*r.qty)}\n`; });
    txt += `  小計：${fmt(totals[i])}\n\n`;
  });

  txt += `━━━━━━━━━━━━━━\n`;
  txt += `工料成本：${fmt(cost)}\n`;
  txt += `利潤率：${data.profitRate}%\n`;
  txt += `📌 建議報價：${fmt(quote)}\n`;
  txt += `每坪單價：${fmt(quote/area)}\n`;
  if(data.note) txt += `\n備註：${data.note}\n`;

  document.getElementById('copy-text').value = txt;
  document.getElementById('copy-modal').classList.add('open');
}

function doCopy(){
  const ta = document.getElementById('copy-text');
  ta.select(); ta.setSelectionRange(0,99999);
  navigator.clipboard.writeText(ta.value).then(()=>alert('✅ 已複製！可以直接貼到 LINE'));
}

function initDefaults(){
  const defaults = [
    {secId:'design', rows:[{item:'設計規劃費',spec:'一式',price:8000,qty:1,unit:'式'},{item:'3D情境圖',spec:'一式',price:15000,qty:3,unit:'式'},{item:'監工費',spec:'一式',price:20000,qty:1,unit:'式'}]},
    {secId:'demo',   rows:[{item:'拆除舊裝潢',spec:'一般',price:5000,qty:1,unit:'式'},{item:'磁磚鋪設',spec:'一般',price:2500,qty:8,unit:'m²'}]},
    {secId:'mep',    rows:[{item:'電路配線',spec:'一般',price:1200,qty:15,unit:'m'},{item:'給排水配管',spec:'一般',price:800,qty:10,unit:'m'}]},
    {secId:'wood',   rows:[{item:'天花板木作',spec:'一般',price:3500,qty:8,unit:'m²'},{item:'主臥衣櫃',spec:'系統',price:55000,qty:1,unit:'式'},{item:'電視牆木作',spec:'訂製',price:45000,qty:1,unit:'式'}]},
    {secId:'ff',     rows:[{item:'沙發',spec:'進口',price:28000,qty:1,unit:'套'},{item:'窗簾',spec:'國產',price:12000,qty:1,unit:'式'}]},
  ];
  defaults.forEach(d=>d.rows.forEach(r=>addRow(d.secId,r)));
}

document.addEventListener('click', e=>{ if(e.target.classList.contains('modal-bg')) closeModal(); });
buildSections();
initDefaults();
</script>
